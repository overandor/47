name: control-entry-sync

on:
  push:
    branches: [control]
    paths:
      - "data/entries/**"
      - "data/dictionary/**"
      - "control/unchained/**"
      - "scripts/validate_control_entries.py"
  workflow_dispatch:

jobs:
  validate-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install jsonschema

      - name: Validate control entries
        run: python scripts/validate_control_entries.py

      - name: Collect changed entry files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD | grep '^data/entries/.*\.json$' > changed_entries.txt || true
          python - <<'PY'
          import json
          from pathlib import Path
          entries = [line.strip() for line in Path('changed_entries.txt').read_text().splitlines() if line.strip()]
          Path('entry_paths.json').write_text(json.dumps(entries))
          print(f"entries={len(entries)}")
          PY

      - name: Dispatch to repo 48 runtime
        env:
          GH_TOKEN: ${{ secrets.RUNTIME_REPO_DISPATCH_TOKEN }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ENTRY_PATHS=$(cat entry_paths.json)
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/ORG_OR_USER/repo-48/dispatches \
            -d '{
              "event_type": "new_entry_batch_v1",
              "client_payload": {
                "spec_version": "v1",
                "system_version": "0.1.0",
                "entry_paths": '"${ENTRY_PATHS}"',
                "control_sha": "'"${GITHUB_SHA}"'",
                "emitted_at_utc": "'"${NOW}"'"
              }
            }'
